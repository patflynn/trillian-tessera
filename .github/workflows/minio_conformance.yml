name: MinIO Conformance

# Fully-hermetic "runs anywhere" conformance lane. It exercises the storage/aws
# object-store backend (cmd/conformance/aws) over S3 via the portable
# gocloud.dev/blob s3blob driver against a self-hosted, vendor-neutral on-prem
# stack -- MinIO for object storage and MySQL for write coordination -- entirely
# on the GitHub Actions runner.
#
# No GCP, no cloud, no Workload Identity, no stored secrets: the MinIO credentials
# are throwaway values defined inline below, and every dependency (MySQL, MinIO,
# the conformance server, the hammer) runs on the runner and dies with it. This
# proves the core thesis of docs/design/cloud-agnostic-storage.md: the same
# storage/aws blob objStore + MySQL coordination runs on a vendor-neutral on-prem
# stack, with the S3 endpoint, region and path-style addressing expressed through
# the s3:// bucket URL the binary derives from a custom --s3_endpoint.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Per-PR group (keyed on github.ref) so distinct PRs never cancel each other's
  # runs. This lane is fully hermetic -- MySQL, MinIO, the conformance server and
  # the hammer all run on the GitHub Actions runner and share no external state --
  # so different PRs can safely run it concurrently.
  group: minio-conformance-${{ github.ref }}
  cancel-in-progress: false

env:
  # Throwaway, local-only credentials. These never leave the runner and grant
  # access to nothing outside this ephemeral job.
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  MYSQL_ROOT_PASSWORD: root
  BUCKET: tessera
  DB: tessera

jobs:
  minio-conformance:
    runs-on: ubuntu-latest

    # MySQL 8 coordination DB as a service container. MYSQL_DATABASE creates the
    # coordination database on first boot, so the conformance server can create
    # its tables in it immediately.
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tessera
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Start MinIO (S3-compatible object store)
        run: |
          # Self-hosted, S3-native object store. Publishes the S3 API on :9000
          # (and the console on :9001). The conformance server's s3blob driver
          # talks to it via --s3_endpoint with path-style addressing.
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e "MINIO_ROOT_USER=${MINIO_ROOT_USER}" \
            -e "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}" \
            minio/minio server /data --console-address ":9001"

          echo "Waiting for MinIO to become ready on http://localhost:9000 ..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              "http://localhost:9000/minio/health/ready" || true)
            if [ "$code" = "200" ]; then
              echo "MinIO is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for MinIO. Container logs:"
          docker logs minio || true
          exit 1

      - name: Create log bucket
        run: |
          # Use the MinIO client (mc) to create the bucket and make it
          # anonymously readable. The hammer reads the log (checkpoint, tiles,
          # entry bundles) directly from MinIO over plain HTTP, so the bucket
          # objects must be downloadable without credentials. Writes still go
          # through the conformance server's authenticated S3 client.
          curl -fsSL -o mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc alias set local http://localhost:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
          ./mc mb "local/${BUCKET}"
          ./mc anonymous set download "local/${BUCKET}"
          echo "Created bucket '${BUCKET}' with anonymous download access."

      - name: Generate ephemeral log keys
        run: |
          go run github.com/transparency-dev/serverless-log/cmd/generate_keys@80334bc9dc573e8f6c5b3694efad6358da50abd4 \
            --key_name=tessera/ci \
            --out_priv="${{ runner.temp }}/key.sec" \
            --out_pub="${{ runner.temp }}/key.pub"
          echo "TESSERA_SIGNER=$(cat ${{ runner.temp }}/key.sec)" >> "$GITHUB_ENV"
          echo "TESSERA_VERIFIER=$(cat ${{ runner.temp }}/key.pub)" >> "$GITHUB_ENV"

      - name: Run conformance server (background)
        run: |
          # The cmd/conformance/aws binary. A non-empty --s3_endpoint makes
          # storageConfigFromFlags derive an s3:// bucket URL pointing at MinIO
          # with path-style addressing (s3ForcePathStyle=true), which MinIO
          # requires, and export the static credentials into the AWS SDK chain for
          # the s3blob driver. Coordination uses MySQL via the --db_* flags.
          echo "Starting conformance server against MinIO bucket=${BUCKET} db=${DB}"
          go run ./cmd/conformance/aws \
            --s3_endpoint="http://localhost:9000" \
            --s3_access_key="${MINIO_ROOT_USER}" \
            --s3_secret="${MINIO_ROOT_PASSWORD}" \
            --bucket="${BUCKET}" \
            --db_host=127.0.0.1 \
            --db_port=3306 \
            --db_user=root \
            --db_password="${MYSQL_ROOT_PASSWORD}" \
            --db_name="${DB}" \
            --signer="${TESSERA_SIGNER}" \
            --listen=:2024 >"${{ runner.temp }}/conformance.log" 2>&1 &
          echo "CONFORMANCE_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for log to be ready
        run: |
          # The hammer reads the log directly from MinIO, so wait until the
          # conformance server has self-initialised and published the initial
          # (size-0) checkpoint into the bucket. This also confirms the server
          # came up and can write to MinIO.
          echo "Waiting for checkpoint at http://localhost:9000/${BUCKET}/checkpoint ..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              "http://localhost:9000/${BUCKET}/checkpoint")
            if [ "$code" = "200" ]; then
              echo "Checkpoint is available."
              exit 0
            fi
            if ! kill -0 "${CONFORMANCE_PID}" 2>/dev/null; then
              echo "Conformance server exited prematurely. Logs:"
              cat "${{ runner.temp }}/conformance.log" || true
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for the initial checkpoint. Conformance server logs:"
          cat "${{ runner.temp }}/conformance.log" || true
          exit 1

      - name: Run hammer
        run: |
          # Reads come straight from the (anonymously-readable) MinIO bucket;
          # writes go to the conformance server's POST /add endpoint. The
          # hammer's exit code is the pass/fail signal for this job.
          go run ./internal/hammer \
            --log_url="http://localhost:9000/${BUCKET}/" \
            --write_log_url="http://localhost:2024/" \
            --log_public_key="${TESSERA_VERIFIER}" \
            --num_writers=8 \
            --max_write_ops=200 \
            --num_readers_random=2 \
            --num_readers_full=2 \
            --leaf_min_size=512 \
            --leaf_write_goal=1000 \
            --max_runtime=5m \
            --show_ui=false

      - name: Dump server and MinIO logs
        if: always()
        run: |
          echo "===== conformance server log ====="
          cat "${{ runner.temp }}/conformance.log" || true
          echo "===== MinIO container log ====="
          docker logs minio || true
