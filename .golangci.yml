version: "2"

linters:
  enable:
    - depguard
    - sloglint
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: "k8s.io/klog/v2"
              desc: "klog is forbidden, use log/slog instead"
            - pkg: "k8s.io/klog"
              desc: "klog is forbidden, use log/slog instead"
    sloglint:
      attr-only: true
      context: all
  exclusions:
    rules:
      # cmd/conformance/aws is the unmodified pre-refactor conformance binary,
      # kept deliberately to exercise the deprecated storage/aws compatibility
      # wrapper end-to-end and prove backward compatibility. Its use of the
      # deprecated package is intentional, so silence staticcheck's SA1019
      # (use-of-deprecated) findings for it only.
      - path: cmd/conformance/aws/
        linters:
          - staticcheck
        text: "SA1019"
